spring.application.name=health-monitoring-backend
server.port=${PORT:8080}

app.upload-dir=uploads

# Database persistence.
# Local default uses an H2 file database. On Render/Supabase, set DATABASE_URL,
# DATABASE_USERNAME, and DATABASE_PASSWORD.
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/health-monitoring}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Emergency email notifications
app.notifications.email.enabled=${ALERT_EMAIL_ENABLED:false}
app.notifications.email.to=${ALERT_EMAIL_TO:}
app.notifications.email.from=${ALERT_EMAIL_FROM:no-reply@health-monitor.local}

# Gmail SMTP
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:25}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
